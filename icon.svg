<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
    <!-- 添加背景矩形 -->
    <!--改进MD3风格的阴影滤镜定义-->
    
    <defs>
    <!--主阴影效果 - 用于安卓图标-->
    <filter id="md3-shadow" x="-8%" y="-8%" width="116%" height="116%">
        <!--第一层阴影 - 环境阴影-->
        <feGaussianBlur stdDeviation="3" result="blur1"/>
        <feOffset dx="0" dy="1" result="offsetBlur1"/>
        <feFlood flood-opacity="0.08" result="shadowColor1"/>
        <feComposite in="shadowColor1" in2="offsetBlur1" operator="in" result="shadowBlur1"/>
        <!--第二层阴影 - 重点阴影-->
        <feGaussianBlur stdDeviation="1.5" result="blur2"/>
        <feOffset dx="0" dy="2" result="offsetBlur2"/>
        <feFlood flood-opacity="0.14" result="shadowColor2"/>
        <feComposite in="shadowColor2" in2="offsetBlur2" operator="in" result="shadowBlur2"/>
        <feMerge>
            <feMergeNode in="shadowBlur1"/>
            <feMergeNode in="shadowBlur2"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
    <!--轻微阴影效果 - 用于Z符号-->
    <filter id="md3-subtle-shadow" x="-5%" y="-5%" width="110%" height="110%">
        <feGaussianBlur stdDeviation="0.8" result="blur"/>
        <feOffset dx="0" dy="1" result="offsetBlur"/>
        <feFlood flood-opacity="0.12" result="shadowColor"/>
        <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadowBlur"/>
        <feMerge>
            <feMergeNode in="shadowBlur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
</defs>
    <!--为安卓机器人应用阴影滤镜-->
    
