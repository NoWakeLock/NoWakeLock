site_name: NoWakeLock 文檔
site_url: https://nowakelock.github.io/NoWakeLock/zh-tw/
site_author: NoWakeLock Team
site_description: >-
  透過 WakeLock、Alarm 和 Service 控制進行全面的 Android 電源管理。
  一個用於優化電池續航力的開源 Xposed 模組。

# Repository
repo_name: NoWakeLock/NoWakeLock
repo_url: https://github.com/NoWakeLock/NoWakeLock
edit_uri: edit/dev/docs/

# Copyright
copyright: Copyright &copy; 2024 NoWakeLock Team

# Configuration
docs_dir: docs/zh-TW
theme:
  name: material
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.ico
  icon:
    logo: logo
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

# Plugins
plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: NoWakeLock
      repo: NoWakeLock
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Page tree
nav:
  - 首頁: index.md
  - 快速開始:
    - 安裝: getting-started/installation.md
    - 問題分析: getting-started/problem-analysis.md
    - 快速設定: getting-started/quick-start.md
    - 模組檢查: getting-started/module-check.md
  - 功能:
    - WakeLocks: features/wakelocks.md
    - 定時任務: features/alarms.md
    - 背景服務: features/services.md
    - 應用程式管理: features/app-management.md
  - 參考:
    - 常見問題: reference/faq.md
    - 故障排除: reference/troubleshooting.md
    - 術語表: reference/glossary.md
    - 更新日誌: reference/changelog.md
  - 開發者:
    - 概覽: developers/index.md
    - 架構:
      - 概述: developers/architecture/overview.md
      - 資料流: developers/architecture/data-flow.md
      - 資料庫: developers/architecture/database.md
      - Xposed鉤子: developers/architecture/xposed-hooks.md
    - API文件:
      - 內部API: developers/api/internal-api.md
      - 內容提供者: developers/api/content-provider.md
    - 實作詳情:
      - 計數系統: developers/implementation/counter-system.md
      - 鉤子詳情: developers/implementation/hook-details.md
      - 行程間通訊: developers/implementation/ipc.md

# Customization
extra:
  annotate:
    json: [.s2]
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NoWakeLock
    - icon: fontawesome/brands/telegram
      link: https://t.me/nowakelock
    - icon: fontawesome/brands/discord
      link: https://discord.gg/kewmG5AShQ
  version:
    provider: mike
    default: stable
  alternate:
    - name: 简体中文
      link: https://nowakelock.github.io/NoWakeLock/zh/
      lang: zh-CN
    - name: English
      link: https://nowakelock.github.io/NoWakeLock/en/
      lang: en
    - name: 繁體中文
      link: https://nowakelock.github.io/NoWakeLock/zh-tw/
      lang: zh-TW
    - name: Français
      link: https://nowakelock.github.io/NoWakeLock/fr/
      lang: fr
    - name: Deutsch
      link: https://nowakelock.github.io/NoWakeLock/de/
      lang: de

