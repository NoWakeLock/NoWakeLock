<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoWakeLock MD3 Prototypes</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f0f0f0;
            font-family: 'Roboto', sans-serif;
        }
        .phone-frame {
            width: 360px;
            height: 740px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin: 20px;
            position: relative;
            background: #fff;
            border: 8px solid #333;
        }
        .phone-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        h2 {
            margin-bottom: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            text-align: center;
        }
    </style>
</head>
<body class="p-6 bg-gray-100">
    <div class="container mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">NoWakeLock Material Design 3 Prototypes</h1>
        
        <div class="flex flex-wrap justify-center">
            <div class="flex flex-col items-center">
                <h2>WakeLock Screen</h2>
                <div class="phone-frame">
                    <iframe src="wakelock.html" title="WakeLock Screen"></iframe>
                </div>
            </div>
            
            <div class="flex flex-col items-center">
                <h2>Alarm Screen</h2>
                <div class="phone-frame">
                    <iframe src="alarm.html" title="Alarm Screen"></iframe>
                </div>
            </div>
            
            <div class="flex flex-col items-center">
                <h2>Service Screen</h2>
                <div class="phone-frame">
                    <iframe src="service.html" title="Service Screen"></iframe>
                </div>
            </div>
            
            <div class="flex flex-col items-center">
                <h2>App Screen</h2>
                <div class="phone-frame">
                    <iframe src="app.html" title="App Screen"></iframe>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
