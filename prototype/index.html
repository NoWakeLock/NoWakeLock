<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoWakeLock - Material Design 3 Prototype</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f5f5f5;
        }
        .prototype-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .phone-frame {
            width: 360px;
            height: 780px;
            background-color: #fff;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            border: 10px solid #111;
        }
        .phone-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .frame-title {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container mx-auto py-8">
        <h1 class="text-3xl font-bold text-center mb-8">NoWakeLock - Material Design 3 Prototype</h1>
        
        <div class="prototype-container">
            <!-- Home Screen -->
            <div class="flex flex-col">
                <div class="phone-frame">
                    <iframe src="home.html"></iframe>
                </div>
                <div class="frame-title">Home Screen</div>
            </div>
            
            <!-- App Detail Screen -->
            <div class="flex flex-col">
                <div class="phone-frame">
                    <iframe src="app_detail.html"></iframe>
                </div>
                <div class="frame-title">App Detail</div>
            </div>
            
            <!-- Wakelock Screen -->
            <div class="flex flex-col">
                <div class="phone-frame">
                    <iframe src="wakelock.html"></iframe>
                </div>
                <div class="frame-title">Wakelock List</div>
            </div>
            
            <!-- Wakelock Detail Screen -->
            <div class="flex flex-col">
                <div class="phone-frame">
                    <iframe src="wakelock_detail.html"></iframe>
                </div>
                <div class="frame-title">Wakelock Detail</div>
            </div>
            
            <!-- Settings Screen -->
            <div class="flex flex-col">
                <div class="phone-frame">
                    <iframe src="settings.html"></iframe>
                </div>
                <div class="frame-title">Settings</div>
            </div>
        </div>
    </div>
</body>
</html>
