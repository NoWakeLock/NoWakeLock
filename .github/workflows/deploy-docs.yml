name: Deploy Docs

on:
  push:
    branches:
      - dev
      - master
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'CNAME'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deployment'
        required: false
        default: 'Manual deployment'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mkdocs-material
          pip install mkdocs-minify-plugin
          pip install mkdocs-git-revision-date-localized-plugin
          pip install pillow cairosvg
          pip install mike

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build all language versions to separate directories
          echo "Building main site (Chinese)..."
          mkdocs build -f mkdocs.yml -d site/
          
          echo "Building English version..."
          mkdocs build -f mkdocs-en.yml -d site/en/
          
          echo "Building German version..."
          mkdocs build -f mkdocs-de.yml -d site/de/
          
          echo "Building French version..."
          mkdocs build -f mkdocs-fr.yml -d site/fr/
          
          echo "Building Traditional Chinese version..."
          mkdocs build -f mkdocs-zh-tw.yml -d site/zh-tw/
          
          # Deploy to gh-pages (main site at root, others as subdirectories)
          echo "Deploying to GitHub Pages..."
          mkdocs gh-deploy --force --config-file mkdocs.yml